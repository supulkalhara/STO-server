name: CI → Test → Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Lint + Test ───────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check (fast smoke test)
        run: python -c "import main; print('Import OK')"
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-32chars-minimum
          MONGODB_URL: ""   # skipped in CI — motor gracefully defers connection

  # ── 2. Create Release (main only) ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Parse version from requirements or hardcode
        id: ver
        run: echo "version=0.3.0" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-${{ steps.sha.outputs.short }}
          name: "SafeTakeOff Backend v${{ steps.ver.outputs.version }} (${{ steps.sha.outputs.short }})"
          body: |
            ## ⚙️ SafeTakeOff Backend — Auto Release

            **Commit**: `${{ github.sha }}`
            **Branch**: `${{ github.ref_name }}`
            **Hosted on**: Render.com (auto-deploys via render.yaml)

            ### Stack
            - FastAPI 0.111 + Uvicorn
            - SQLAlchemy (SQLite dev / PostgreSQL prod)
            - MongoDB Atlas via Motor 3.4
            - XGBoost Go/No-Go advisor + SHAP explainability
            - JWT HS256 auth · slowapi rate limiting · structlog JSON

            ---
            *Auto-generated by GitHub Actions on every push to main.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
