# CONTRIBUTING.md

Thank you for contributing to SafeTakeOff Backend! We appreciate your help in making this project better.

## How to Contribute

1. **Fork the Repository**: Click the 'Fork' button at the top right of this repository page.
2. **Create a New Branch**: Clone your forked repository and create a new branch for your changes.
   ```sh
git clone https://github.com/your-username/safetakeoff-backend.git
cd safetakeoff-backend
git checkout -b feature/my-new-feature
```
3. **Make Changes**: Make the necessary changes to the codebase.
4. **Commit Your Changes**: Add and commit your changes with a descriptive message.
   ```sh
git add .
git commit -m 'Add new feature'
```
5. **Push Your Changes**: Push your changes to your forked repository.
   ```sh
git push origin feature/my-new-feature
```
6. **Create a Pull Request**: Go to the original repository and click the 'New Pull Request' button. Select your branch and create the pull request.

## Code Style

- Follow PEP 8 guidelines for Python code.
- Use meaningful variable names and function names.
- Write clear and concise documentation for new features or changes.

## Testing

- Ensure all tests pass before submitting a pull request.
- Run the test suite locally to catch any issues early.
   ```sh
git run tests
```

We look forward to your contributions!